<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Playlist to M3U</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      box-sizing: border-box;
      background: linear-gradient(135deg, #020617, #111827 55%, #0f172a);
    }
    .card {
      width: min(900px, 100%);
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 20px 45px rgba(2, 6, 23, 0.35);
    }
    h1 { margin-top: 0; }
    p { line-height: 1.6; color: #cbd5e1; }
    label { display: block; margin-top: 14px; font-weight: 600; }
    textarea, input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #334155;
      border-radius: 12px;
      background: #020617;
      color: #f8fafc;
      padding: 12px 14px;
      margin-top: 8px;
      font: inherit;
    }
    textarea { min-height: 120px; resize: vertical; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px; }
    button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    button.primary { background: #38bdf8; color: #082f49; }
    button.secondary { background: #1e293b; color: #f8fafc; }
    .status {
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #111827;
      border: 1px solid #334155;
      min-height: 24px;
    }
    .results {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }
    .result {
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 14px;
      background: #0b1220;
    }
    .panel {
      margin-top: 16px;
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 14px;
      background: #0b1220;
      display: none;
    }
    .picker-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
      max-height: 280px;
      overflow: auto;
    }
    .picker-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      border: 1px solid #1e293b;
      border-radius: 10px;
      padding: 8px 10px;
      background: #111827;
    }
    .picker-item input { margin-top: 3px; }
    .picker-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }
    .muted { color: #94a3b8; font-size: 0.95rem; }
    code { background: #111827; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>YouTube Playlist → M3U</h1>
    <p>Paste one or more YouTube playlist links, add your YouTube Data API key, and download each list as an M3U file.</p>

    <label for="apiKey">YouTube Data API key</label>
    <input id="apiKey" type="password" placeholder="Enter your API key" />

    <label for="googleClientId">Google Client ID (재생목록 가져오기)</label>
    <input id="googleClientId" type="text" placeholder="Enter your Google OAuth client ID" />

    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-top:14px;">
      <label for="playlistUrls" style="margin:0;">Playlist URLs (한줄에 한개씩)</label>
      <button id="myListBtn" class="secondary" type="button">재생목록 가져오기</button>
    </div>
    <textarea id="playlistUrls" placeholder="https://www.youtube.com/playlist?list=PLxxxx&#10;https://www.youtube.com/playlist?list=PLyyyy"></textarea>

    <div id="playlistPickerPanel" class="panel" aria-live="polite">
      <div class="muted">Select the playlists you want to add to the list.</div>
      <div id="playlistPickerList" class="picker-list"></div>
      <div class="picker-actions">
        <button id="addSelectedBtn" class="primary" type="button">Add selected playlists</button>
        <button id="cancelPickerBtn" class="secondary" type="button">Cancel</button>
      </div>
    </div>

    <div class="actions">
      <button id="buildBtn" class="primary">M3U 파일 생성</button>
      <button id="clearBtn" class="secondary">Clear</button>
    </div>

    <div id="status" class="status">준비.</div>
    <div id="results" class="results"></div>
  </main>

  <script>
    const playlistInput = document.getElementById('playlistUrls');
    const apiKeyInput = document.getElementById('apiKey');
    const googleClientIdInput = document.getElementById('googleClientId');
    const buildBtn = document.getElementById('buildBtn');
    const clearBtn = document.getElementById('clearBtn');
    const myListBtn = document.getElementById('myListBtn');
    const pickerPanel = document.getElementById('playlistPickerPanel');
    const pickerList = document.getElementById('playlistPickerList');
    const addSelectedBtn = document.getElementById('addSelectedBtn');
    const cancelPickerBtn = document.getElementById('cancelPickerBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    let googleAccessToken = null;
    let googlePlaylists = [];
    let googleTokenClient = null;

    function setStatus(message, isError = false) {
      statusEl.textContent = message;
      statusEl.style.borderColor = isError ? '#ef4444' : '#334155';
    }

    function extractPlaylistId(value) {
      const trimmed = value.trim();
      if (!trimmed) return null;

      if (/^[A-Za-z0-9_-]{10,}$/.test(trimmed)) {
        return trimmed;
      }

      try {
        const parsed = new URL(trimmed);
        const listParam = parsed.searchParams.get('list');
        if (listParam) return listParam;
      } catch {
        return null;
      }

      return null;
    }

    function createM3U(items) {
      const lines = ['#EXTM3U'];
      items.forEach((item) => {
        const safeTitle = (item.title || 'Untitled').replace(/\r?\n/g, ' ').trim() || 'Untitled';
        lines.push(`#EXTINF:-1,${safeTitle}`);
        lines.push(`https://www.youtube.com/watch?v=${item.videoId}`);
      });
      return lines.join('\n') + '\n';
    }

    function downloadText(filename, content) {
      const blob = new Blob([content], { type: 'application/x-mpegurl;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement('a');
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    async function fetchPlaylistItems(playlistUrl, apiKey) {
      const playlistId = extractPlaylistId(playlistUrl);
      if (!playlistId) {
        throw new Error(`Could not parse a playlist ID from: ${playlistUrl}`);
      }

      const playlistMetaUrl = new URL('https://www.googleapis.com/youtube/v3/playlists');
      playlistMetaUrl.searchParams.set('part', 'snippet');
      playlistMetaUrl.searchParams.set('id', playlistId);
      playlistMetaUrl.searchParams.set('key', apiKey);

      const playlistMetaResponse = await fetch(playlistMetaUrl.toString());
      if (!playlistMetaResponse.ok) {
        throw new Error(`YouTube API error ${playlistMetaResponse.status}`);
      }

      const playlistMetaData = await playlistMetaResponse.json();
      if (!playlistMetaData.items || !playlistMetaData.items.length) {
        throw new Error('Playlist not found or inaccessible.');
      }

      const playlistTitle = playlistMetaData.items[0].snippet?.title || 'Playlist';
      const items = [];
      let pageToken = '';

      while (true) {
        const url = new URL('https://www.googleapis.com/youtube/v3/playlistItems');
        url.searchParams.set('part', 'snippet');
        url.searchParams.set('playlistId', playlistId);
        url.searchParams.set('maxResults', '50');
        url.searchParams.set('key', apiKey);
        if (pageToken) url.searchParams.set('pageToken', pageToken);

        const response = await fetch(url.toString());
        if (!response.ok) {
          throw new Error(`YouTube API error ${response.status}`);
        }

        const data = await response.json();
        if (data.error) {
          throw new Error(data.error.message || 'YouTube API request failed');
        }

        const pageItems = (data.items || [])
          .map((entry) => {
            const snippet = entry.snippet || {};
            const videoId = snippet.resourceId?.videoId;
            if (!videoId) return null;
            return {
              videoId,
              title: snippet.title || 'Untitled'
            };
          })
          .filter(Boolean);

        items.push(...pageItems);

        if (!data.nextPageToken) break;
        pageToken = data.nextPageToken;
      }

      return { playlistTitle, items };
    }

    function hidePickerPanel() {
      pickerPanel.style.display = 'none';
    }

    function showPickerPanel() {
      pickerPanel.style.display = 'block';
    }

    function renderPlaylistPicker() {
      pickerList.innerHTML = '';
      if (!googlePlaylists.length) {
        const empty = document.createElement('div');
        empty.className = 'muted';
        empty.textContent = 'No playlists were found for this account.';
        pickerList.appendChild(empty);
        return;
      }

      googlePlaylists.forEach((playlist) => {
        const label = document.createElement('label');
        label.className = 'picker-item';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = playlist.id;
        checkbox.checked = true;

        const content = document.createElement('div');
        const title = document.createElement('strong');
        title.textContent = playlist.title;
        content.appendChild(title);

        if (playlist.description) {
          const desc = document.createElement('div');
          desc.className = 'muted';
          desc.textContent = playlist.description;
          content.appendChild(desc);
        }

        label.appendChild(checkbox);
        label.appendChild(content);
        pickerList.appendChild(label);
      });
    }

    async function ensureGoogleSdk() {
      if (window.google && window.google.accounts && window.google.accounts.oauth2) {
        return;
      }

      await new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = 'https://accounts.google.com/gsi/client';
        script.async = true;
        script.defer = true;
        script.onload = resolve;
        script.onerror = () => reject(new Error('Unable to load Google sign-in script.'));
        document.head.appendChild(script);
      });
    }

    async function loadUserPlaylists() {
      if (!googleAccessToken) {
        throw new Error('Google access token is missing.');
      }

      setStatus('Loading your playlists...');
      const response = await fetch('https://www.googleapis.com/youtube/v3/playlists?part=snippet,status&mine=true&maxResults=50', {
        headers: {
          Authorization: `Bearer ${googleAccessToken}`
        }
      });

      const data = await response.json();
      if (!response.ok || data.error) {
        throw new Error(data.error?.message || 'Unable to load playlists.');
      }

      googlePlaylists = (data.items || []).map((item) => ({
        id: item.id,
        title: item.snippet?.title || 'Untitled playlist',
        description: item.snippet?.description || ''
      }));

      renderPlaylistPicker();
      showPickerPanel();
      setStatus('Select one or more playlists to add.');
    }

    async function handleMyListClick() {
      const clientId = googleClientIdInput.value.trim();
      if (!clientId) {
        setStatus('Enter a Google OAuth client ID first.', true);
        return;
      }

      try {
        await ensureGoogleSdk();
        setStatus('Opening Google sign-in...');

        if (!googleTokenClient || googleTokenClient.clientId !== clientId) {
          googleTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: clientId,
            scope: 'https://www.googleapis.com/auth/youtube.readonly',
            callback: async (response) => {
              if (response.error) {
                setStatus(`Google sign-in failed: ${response.error}`, true);
                return;
              }
              googleAccessToken = response.access_token;
              await loadUserPlaylists();
            }
          });
        }

        googleTokenClient.requestAccessToken();
      } catch (error) {
        setStatus(error.message || 'Could not start Google sign-in.', true);
      }
    }

    async function buildPlaylists() {
      const urls = playlistInput.value
        .split(/\n+/)
        .map((value) => value.trim())
        .filter(Boolean);

      if (!urls.length) {
        setStatus('Add at least one playlist URL.', true);
        return;
      }

      const apiKey = apiKeyInput.value.trim();
      if (!apiKey) {
        setStatus('A YouTube Data API key is required.', true);
        return;
      }

      resultsEl.innerHTML = '';
      setStatus('Fetching playlists...');

      try {
        for (const url of urls) {
          const { playlistTitle, items } = await fetchPlaylistItems(url, apiKey);
          const safeTitle = playlistTitle.replace(/[^a-z0-9]+/gi, '-').replace(/(^-|-$)/g, '').toLowerCase() || 'playlist';
          const m3u = createM3U(items);
          downloadText(`${safeTitle}.m3u`, m3u);

          const item = document.createElement('div');
          item.className = 'result';
          item.innerHTML = `<strong>${playlistTitle}</strong><br /><span class="muted">${items.length} videos exported to <code>${safeTitle}.m3u</code></span>`;
          resultsEl.appendChild(item);
        }

        setStatus(`Done. Downloaded ${urls.length} playlist file${urls.length > 1 ? 's' : ''}.`);
      } catch (error) {
        setStatus(error.message || 'Something went wrong.', true);
      }
    }

    myListBtn.addEventListener('click', handleMyListClick);

    addSelectedBtn.addEventListener('click', () => {
      const selectedIds = Array.from(pickerList.querySelectorAll('input[type="checkbox"]:checked'))
        .map((input) => input.value)
        .filter(Boolean);

      if (!selectedIds.length) {
        setStatus('Select at least one playlist.', true);
        return;
      }

      const urls = selectedIds.map((id) => `https://www.youtube.com/playlist?list=${id}`);
      const existing = playlistInput.value.trim();
      playlistInput.value = existing ? `${existing}\n${urls.join('\n')}` : urls.join('\n');
      hidePickerPanel();
      setStatus(`Added ${selectedIds.length} playlist${selectedIds.length > 1 ? 's' : ''}.`);
    });

    cancelPickerBtn.addEventListener('click', () => {
      hidePickerPanel();
      setStatus('Cancelled playlist selection.');
    });

    buildBtn.addEventListener('click', buildPlaylists);
    clearBtn.addEventListener('click', () => {
      playlistInput.value = '';
      apiKeyInput.value = '';
      googleClientIdInput.value = '';
      resultsEl.innerHTML = '';
      googlePlaylists = [];
      googleAccessToken = null;
      hidePickerPanel();
      setStatus('Ready.');
    });
  </script>
</body>
</html>
